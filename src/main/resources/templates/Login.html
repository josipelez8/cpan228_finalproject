<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – ExpenSeLive</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <h1>Expen<span>Se</span>Live</h1>
            <p>Track every cent.</p>
        </div>

        <div class="alert alert-error" th:if="${param.error}">
            Incorrect username or password. Please try again.
        </div>

        <div class="alert alert-success" th:if="${param.registered}">
            Account created! You can now log in.
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="" required autocomplete="username" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="" required autocomplete="current-password" />
            </div>

            <button style="margin-top:8px;" type="submit" class="btn btn-primary">Sign in</button>

        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one free</a>
        </div>

    </div>
</div>

</body>
</html>
